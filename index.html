<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weißer Bim Schwarzohr — Diorama</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0a0506;
            --curtain-red: #6b1520;
            --curtain-dark: #2a0810;
            --gold: #c9a84c;
            --gold-dim: #8a7233;
            --gold-bright: #e8cc6e;
            --cream: #e8dcc8;
            --cream-dim: rgba(232, 220, 200, 0.6);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg-deep);
            color: var(--cream);
            font-family: 'Cormorant Garamond', Georgia, serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ---- CURTAINS ---- */
        .curtain-left,
        .curtain-right {
            position: fixed;
            top: 0;
            bottom: 0;
            width: clamp(40px, 8vw, 120px);
            z-index: 10;
            pointer-events: none;
        }

        .curtain-left {
            left: 0;
            background: linear-gradient(
                to right,
                var(--curtain-red) 0%,
                var(--curtain-dark) 40%,
                transparent 100%
            );
        }

        .curtain-right {
            right: 0;
            background: linear-gradient(
                to left,
                var(--curtain-red) 0%,
                var(--curtain-dark) 40%,
                transparent 100%
            );
        }

        /* Curtain fabric texture via repeating gradient */
        .curtain-left::after,
        .curtain-right::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                180deg,
                rgba(255,255,255,0.02) 0px,
                transparent 2px,
                transparent 12px,
                rgba(255,255,255,0.02) 14px
            );
        }

        /* ---- PELMET (top drape) ---- */
        .pelmet {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(
                to bottom,
                var(--curtain-red),
                transparent
            );
            z-index: 11;
            pointer-events: none;
        }

        /* ---- MAIN CONTENT ---- */
        .stage {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px 80px;
            position: relative;
            z-index: 5;
        }

        /* ---- TITLE ---- */
        .title-block {
            text-align: center;
            margin-bottom: 48px;
            opacity: 0;
            animation: fadeIn 2s ease-out 0.5s forwards;
        }

        .book-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            color: var(--gold);
            letter-spacing: 0.04em;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .book-author {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-style: italic;
            font-size: clamp(0.95rem, 2.5vw, 1.15rem);
            color: var(--gold-dim);
            letter-spacing: 0.08em;
        }

        .ornament {
            display: block;
            margin: 20px auto 0;
            color: var(--gold-dim);
            font-size: 1.4rem;
            letter-spacing: 0.5em;
            user-select: none;
        }

        /* ---- VIDEO ---- */
        .video-frame {
            position: relative;
            margin: 0 auto 52px;
            max-width: 600px;
            border: 2px solid var(--gold-dim);
            border-radius: 3px;
            overflow: hidden;
            box-shadow:
                0 0 40px rgba(201, 168, 76, 0.08),
                0 8px 32px rgba(0, 0, 0, 0.6);
            opacity: 0;
            animation: fadeIn 2s ease-out 1.2s forwards;
        }

        .video-frame::before {
            content: '';
            position: absolute;
            inset: -1px;
            border: 1px solid rgba(201, 168, 76, 0.15);
            border-radius: 4px;
            pointer-events: none;
            z-index: 2;
        }

        .video-frame video {
            display: block;
            width: 100%;
            height: auto;
        }

        /* ---- TEXT AREA ---- */
        .excerpt-block {
            max-width: 560px;
            margin: 0 auto;
            text-align: center;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 2.5s forwards;
        }

        .excerpt-label {
            font-family: 'Playfair Display', Georgia, serif;
            font-style: italic;
            font-size: 0.85rem;
            color: var(--gold-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .excerpt-text {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(1.05rem, 3vw, 1.3rem);
            line-height: 1.75;
            color: var(--cream);
            text-align: justify;
            text-align-last: center;
            min-height: 160px;
        }

        .excerpt-text .cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background: var(--gold);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.9s step-end infinite;
        }

        .excerpt-text .paragraph-break {
            display: block;
            height: 1.2em;
        }

        .excerpt-text .quote-marks {
            color: var(--gold-dim);
        }

        /* ---- FOOTER ---- */
        .footer {
            text-align: center;
            margin-top: 64px;
            padding-top: 32px;
            border-top: 1px solid rgba(201, 168, 76, 0.12);
            opacity: 0;
            animation: fadeIn 1.5s ease-out 3.5s forwards;
        }

        .footer-text {
            font-style: italic;
            font-size: 0.9rem;
            color: var(--cream-dim);
            line-height: 1.6;
        }

        .footer-craft {
            font-size: 0.8rem;
            color: var(--gold-dim);
            margin-top: 12px;
            letter-spacing: 0.06em;
        }

        /* ---- ANIMATIONS ---- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0; }
        }

        /* ---- REDUCED MOTION ---- */
        @media (prefers-reduced-motion: reduce) {
            .title-block,
            .video-frame,
            .excerpt-block,
            .footer {
                opacity: 1;
                animation: none;
            }
            .cursor {
                animation: none;
                opacity: 1;
            }
        }

        /* ---- MOBILE ---- */
        @media (max-width: 520px) {
            .stage {
                padding: 40px 18px 60px;
            }
            .video-frame {
                margin-bottom: 36px;
            }
            .excerpt-text {
                text-align: left;
                text-align-last: left;
            }
        }
    </style>
</head>
<body>
    <div class="curtain-left"></div>
    <div class="curtain-right"></div>
    <div class="pelmet"></div>

    <main class="stage">
        <header class="title-block">
            <h1 class="book-title">Weißer Bim Schwarzohr</h1>
            <p class="book-author">Gawriil Trojepolski</p>
            <span class="ornament">— ✦ —</span>
        </header>

        <div class="video-frame">
            <video autoplay loop muted playsinline>
                <source src="diorama.mp4" type="video/mp4">
            </video>
        </div>

        <section class="excerpt-block">
            <p class="excerpt-label">Auszug aus dem Roman</p>
            <div class="excerpt-text" id="typewriter"></div>
        </section>

        <footer class="footer">
            <p class="footer-text">
                Papier-Diorama nach dem Roman<br>
                von Gawriil Trojepolski
            </p>
            <p class="footer-craft">Handgefertigt, 2026</p>
        </footer>
    </main>

    <script>
        const TEXT_PARTS = [
            {
                type: 'text',
                content: 'Frauen huschten in den Korridor hinaus, und Bim setzte sich vors Bett, am ganzen Körper zitternd und offensichtlich bereit, eher sein Leben hinzugeben, als fremde Menschen in diesen für seinen Freund so schweren Minuten an ihn heranzulassen.'
            },
            {
                type: 'break'
            },
            {
                type: 'text',
                content: 'Der Arzt stand an der Tür und sagte: ',
            },
            {
                type: 'quote',
                content: '«Ist das ein Hund! Was machen wir denn jetzt?»'
            }
        ];

        const container = document.getElementById('typewriter');
        const CHAR_DELAY = 55;
        const BREAK_DELAY = 600;
        const RESTART_DELAY = 6000;

        let currentPart = 0;
        let currentChar = 0;
        let cursor = null;

        function createCursor() {
            if (cursor) cursor.remove();
            cursor = document.createElement('span');
            cursor.className = 'cursor';
            container.appendChild(cursor);
        }

        function typeNextChar() {
            if (currentPart >= TEXT_PARTS.length) {
                createCursor();
                setTimeout(() => {
                    container.innerHTML = '';
                    currentPart = 0;
                    currentChar = 0;
                    typeNextChar();
                }, RESTART_DELAY);
                return;
            }

            const part = TEXT_PARTS[currentPart];

            if (part.type === 'break') {
                if (cursor) cursor.remove();
                const br = document.createElement('span');
                br.className = 'paragraph-break';
                container.appendChild(br);
                currentPart++;
                currentChar = 0;
                createCursor();
                setTimeout(typeNextChar, BREAK_DELAY);
                return;
            }

            if (currentChar >= part.content.length) {
                currentPart++;
                currentChar = 0;
                typeNextChar();
                return;
            }

            if (currentChar === 0 && part.type === 'quote') {
                if (cursor) cursor.remove();
                const span = document.createElement('span');
                span.className = 'quote-marks';
                span.setAttribute('data-part', currentPart);
                container.appendChild(span);
                createCursor();
            }

            if (cursor) cursor.remove();

            const char = part.content[currentChar];

            if (part.type === 'quote') {
                const quoteSpan = container.querySelector(`[data-part="${currentPart}"]`);
                if (quoteSpan) {
                    quoteSpan.textContent += char;
                }
            } else {
                container.insertBefore(
                    document.createTextNode(char),
                    cursor
                );
            }

            currentChar++;
            createCursor();

            let delay = CHAR_DELAY;
            if (char === '.' || char === '!' || char === '?') delay = CHAR_DELAY * 6;
            else if (char === ',') delay = CHAR_DELAY * 3;
            else if (char === ':' || char === ';') delay = CHAR_DELAY * 4;
            else if (char === '»') delay = CHAR_DELAY * 4;

            setTimeout(typeNextChar, delay);
        }

        /* Start typing after page elements have faded in */
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    setTimeout(typeNextChar, 3200);
                    observer.disconnect();
                }
            });
        });
        observer.observe(container);

        /* Fallback start */
        setTimeout(() => {
            if (container.childNodes.length === 0) {
                typeNextChar();
            }
        }, 4000);
    </script>
</body>
</html>
