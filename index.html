<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weißer Bim Schwarzohr — Diorama</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0a0506;
            --curtain-red: #6b1520;
            --curtain-dark: #2a0810;
            --gold: #c9a84c;
            --gold-dim: #8a7233;
            --gold-bright: #e8cc6e;
            --cream: #e8dcc8;
            --cream-dim: rgba(232, 220, 200, 0.6);
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg-deep);
            color: var(--cream);
            font-family: 'Cormorant Garamond', Georgia, serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .curtain-left, .curtain-right {
            position: fixed;
            top: 0; bottom: 0;
            width: clamp(40px, 8vw, 120px);
            z-index: 10;
            pointer-events: none;
        }
        .curtain-left {
            left: 0;
            background: linear-gradient(to right, var(--curtain-red) 0%, var(--curtain-dark) 40%, transparent 100%);
        }
        .curtain-right {
            right: 0;
            background: linear-gradient(to left, var(--curtain-red) 0%, var(--curtain-dark) 40%, transparent 100%);
        }
        .curtain-left::after, .curtain-right::after {
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(180deg, rgba(255,255,255,0.02) 0px, transparent 2px, transparent 12px, rgba(255,255,255,0.02) 14px);
        }

        .pelmet {
            position: fixed; top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(to bottom, var(--curtain-red), transparent);
            z-index: 11; pointer-events: none;
        }

        .stage {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px 80px;
            position: relative;
            z-index: 5;
        }

        /* TITLE */
        .title-block {
            text-align: center;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 2s ease-out 0.5s forwards;
        }
        .book-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            color: var(--gold);
            letter-spacing: 0.04em;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .book-author {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-style: italic;
            font-size: clamp(0.95rem, 2.5vw, 1.15rem);
            color: var(--gold-dim);
            letter-spacing: 0.08em;
        }
        .ornament {
            display: block;
            margin: 20px auto 0;
            color: var(--gold-dim);
            font-size: 1.4rem;
            letter-spacing: 0.5em;
            user-select: none;
        }

        /* TEXT OVERLAY ON VIDEO */
        .excerpt-block {
            position: absolute;
            left: 5%;
            right: 5%;
            top: 67%;
            bottom: 0%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            z-index: 3;
            background: rgba(8, 4, 4, 0.7);
            border-top: 1px solid rgba(201, 168, 76, 0.2);
            border-bottom: 1px solid rgba(201, 168, 76, 0.2);
            padding: 16px 20px;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 1.8s forwards;
            pointer-events: none;
        }
        .excerpt-label {
            font-family: 'Playfair Display', Georgia, serif;
            font-style: italic;
            font-size: clamp(0.65rem, 1.8vw, 0.85rem);
            color: var(--gold-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        .excerpt-text {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(0.85rem, 2.2vw, 1.15rem);
            line-height: 1.65;
            color: var(--cream);
            text-align: center;
            overflow-y: auto;
        }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background: var(--gold);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.9s step-end infinite;
        }
        .paragraph-break {
            display: block;
            height: 1.2em;
        }
        .quote-marks {
            color: var(--gold-dim);
        }

        /* VIDEO BELOW TEXT */
        .video-frame {
            position: relative;
            margin: 0 auto 52px;
            max-width: 600px;
            border: 2px solid var(--gold-dim);
            border-radius: 3px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(201,168,76,0.08), 0 8px 32px rgba(0,0,0,0.6);
            opacity: 0;
            animation: fadeIn 2s ease-out 1s forwards;
        }
        .video-frame video {
            display: block;
            width: 100%;
            height: auto;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            margin-top: 12px;
            padding-top: 32px;
            border-top: 1px solid rgba(201,168,76,0.12);
            opacity: 0;
            animation: fadeIn 1.5s ease-out 2.5s forwards;
        }
        .footer-text {
            font-style: italic;
            font-size: 0.9rem;
            color: var(--cream-dim);
            line-height: 1.6;
        }
        .footer-craft {
            font-size: 0.8rem;
            color: var(--gold-dim);
            margin-top: 12px;
            letter-spacing: 0.06em;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0; }
        }

        @media (prefers-reduced-motion: reduce) {
            .title-block, .video-frame, .excerpt-block, .footer {
                opacity: 1; animation: none;
            }
            .cursor { animation: none; opacity: 1; }
        }

        @media (max-width: 520px) {
            .stage { padding: 40px 18px 60px; }
            .video-frame { margin-bottom: 36px; }
            .excerpt-block { left: 3%; right: 3%; padding: 10px 12px; top: 30%; }
            .excerpt-text { font-size: 0.8rem; line-height: 1.5; }
        }
    </style>
</head>
<body>
    <div class="curtain-left"></div>
    <div class="curtain-right"></div>
    <div class="pelmet"></div>

    <main class="stage">
        <header class="title-block">
            <h1 class="book-title">Weißer Bim Schwarzohr</h1>
            <p class="book-author">Gawriil Trojepolski</p>
            <span class="ornament">— ✦ —</span>
        </header>

        <div class="video-frame">
            <video autoplay loop muted playsinline>
                <source src="diorama.mp4" type="video/mp4">
            </video>
            <section class="excerpt-block">
                <p class="excerpt-label">Auszug aus dem Roman</p>
                <div class="excerpt-text" id="typewriter"></div>
            </section>
        </div>

        <footer class="footer">
            <p class="footer-text">
                Papier-Diorama nach dem Roman<br>
                von Gawriil Trojepolski
            </p>
            <p class="footer-craft">Handgefertigt, 2026</p>
        </footer>
    </main>

    <script>
        const FULL_TEXT = 
            'Frauen huschten in den Korridor hinaus, und Bim setzte sich vors Bett, ' +
            'am ganzen Körper zitternd und offensichtlich bereit, eher sein Leben ' +
            'hinzugeben, als fremde Menschen in diesen für seinen Freund so schweren ' +
            'Minuten an ihn heranzulassen.' +
            '\n\n' +
            'Der Arzt stand an der Tür und sagte: «Ist das ein Hund! Was machen wir denn jetzt?»';

        const container = document.getElementById('typewriter');
        const CHAR_DELAY = 55;
        const RESTART_DELAY = 6000;
        let index = 0;
        let timer = null;

        function typeChar() {
            if (index >= FULL_TEXT.length) {
                // Done typing — pause, then restart
                timer = setTimeout(function() {
                    container.innerHTML = '';
                    index = 0;
                    typeChar();
                }, RESTART_DELAY);
                return;
            }

            var ch = FULL_TEXT[index];

            // Remove old cursor
            var oldCursor = container.querySelector('.cursor');
            if (oldCursor) oldCursor.remove();

            if (ch === '\n') {
                // Skip double newlines, insert one paragraph break
                if (index + 1 < FULL_TEXT.length && FULL_TEXT[index + 1] === '\n') {
                    var br = document.createElement('span');
                    br.className = 'paragraph-break';
                    container.appendChild(br);
                    index += 2;
                } else {
                    index++;
                }
                // Add cursor after break
                var c = document.createElement('span');
                c.className = 'cursor';
                container.appendChild(c);
                timer = setTimeout(typeChar, 400);
                return;
            }

            // Check if inside quote
            var isQuote = false;
            var openCount = 0;
            for (var i = 0; i < index; i++) {
                if (FULL_TEXT[i] === '«') openCount++;
                if (FULL_TEXT[i] === '»') openCount--;
            }
            if (openCount > 0 || ch === '«') isQuote = true;

            if (isQuote) {
                // Find or create the quote span
                var quoteSpan = container.querySelector('.quote-marks');
                if (!quoteSpan) {
                    quoteSpan = document.createElement('span');
                    quoteSpan.className = 'quote-marks';
                    container.appendChild(quoteSpan);
                }
                quoteSpan.textContent += ch;
            } else {
                container.appendChild(document.createTextNode(ch));
            }

            // Add new cursor
            var cur = document.createElement('span');
            cur.className = 'cursor';
            container.appendChild(cur);

            index++;

            // Punctuation pauses
            var delay = CHAR_DELAY;
            if (ch === '.' || ch === '!' || ch === '?') delay = CHAR_DELAY * 6;
            else if (ch === ',') delay = CHAR_DELAY * 3;
            else if (ch === ':' || ch === ';') delay = CHAR_DELAY * 4;
            else if (ch === '»' || ch === '«') delay = CHAR_DELAY * 3;

            timer = setTimeout(typeChar, delay);
        }

        // Start after fade-in animations
        setTimeout(typeChar, 2500);
    </script>
</body>
</html>
